<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEP Voetbaltoernooi – Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #cc0000; --red-dark: #8a0000; --red-light: #e63333;
    --yellow: #f5d000; --white: #fffdf5; --text: #1a0a0a; --muted: #8a6a6a;
    --card-bg: rgba(255,255,255,.05); --card-border: rgba(255,80,80,.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--text); color: var(--white); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 60%, var(--red-light) 100%);
    padding: 22px 32px 16px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,.45);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: var(--yellow); letter-spacing: 2px; line-height: 1; text-shadow: 2px 2px 0 rgba(0,0,0,.3); }
  .logo span { color: var(--white); }
  .header-meta { flex: 1; }
  .header-meta h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 3px; color: rgba(255,255,255,.65); text-transform: uppercase; }
  #status-bar { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--yellow); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  #status-text { font-size: .82rem; color: rgba(255,255,255,.7); }
  #next-refresh { font-size: .72rem; color: rgba(255,255,255,.35); margin-top: 3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  #btn-refresh { background: rgba(255,255,255,.12); color: var(--white); padding: 9px 16px; font-size: .88rem; border: 1px solid rgba(255,255,255,.2); border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; transition: all .2s; }
  #btn-refresh:hover { background: rgba(255,255,255,.2); }
  #btn-refresh:disabled { opacity: .4; cursor: not-allowed; }

  .tab-bar { background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,80,80,.2); padding: 0 32px; display: flex; }
  .tab { padding: 14px 28px 12px; font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 2px; color: rgba(255,255,255,.4); border-bottom: 3px solid transparent; cursor: pointer; transition: all .2s; user-select: none; }
  .tab:hover { color: rgba(255,255,255,.7); }
  .tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }

  .filter-bar { background: rgba(255,255,255,.03); border-bottom: 1px solid rgba(255,80,80,.1); padding: 12px 32px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .filter-btn { background: rgba(255,255,255,.07); color: rgba(255,255,255,.65); border: 1px solid rgba(255,80,80,.2); padding: 5px 15px; font-size: .8rem; border-radius: 20px; letter-spacing: .5px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; transition: all .2s; }
  .filter-btn.active { background: var(--red); color: var(--white); border-color: var(--red-light); }
  .filter-btn:hover { border-color: var(--yellow); color: var(--white); }

  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  #loading-screen { text-align: center; padding: 100px 20px; }
  #loading-screen .spin { font-size: 3rem; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-screen h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: rgba(255,255,255,.5); }

  #error-screen { text-align: center; padding: 80px 20px; }
  #error-screen .icon { font-size: 3rem; margin-bottom: 16px; }
  #error-screen h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--yellow); letter-spacing: 2px; margin-bottom: 12px; }
  #error-screen p { color: rgba(255,255,255,.55); font-size: .9rem; line-height: 1.7; }

  #poules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 18px; }
  .poule-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; animation: fadeIn .35s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  .poule-header { background: var(--red-dark); padding: 11px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--yellow); }
  .poule-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: var(--yellow); }
  .poule-meta { font-size: .72rem; color: rgba(255,255,255,.5); text-align: right; line-height: 1.4; }
  table { width: 100%; border-collapse: collapse; font-size: .81rem; }
  thead tr { background: rgba(255,255,255,.05); }
  thead th { padding: 7px 13px; text-align: left; font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; }
  thead th.num, td.num { text-align: center; }
  tbody tr { border-bottom: 1px solid rgba(255,80,80,.1); transition: background .15s; }
  tbody tr:hover { background: rgba(255,255,255,.05); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 9px 13px; vertical-align: middle; }
  td.rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; color: var(--muted); text-align: center; }
  tr:first-child td.rank { color: var(--yellow); }
  tr:nth-child(2) td.rank { color: #c8b8b8; }
  tr:nth-child(3) td.rank { color: #c08060; }
  .team-name { font-weight: 600; }
  .pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--yellow); text-align: center; }

  .poule-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .ps-btn { background: rgba(255,255,255,.07); color: rgba(255,255,255,.6); border: 1px solid rgba(255,80,80,.2); padding: 5px 13px; font-size: .78rem; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; transition: all .2s; }
  .ps-btn.active { background: var(--red); color: var(--white); border-color: var(--red-light); }
  .ps-btn:hover { border-color: var(--yellow); color: var(--white); }
  .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 18px; }
  .match-group { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; animation: fadeIn .3s ease both; }
  .match-group-header { background: var(--red-dark); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--yellow); }
  .match-group-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--yellow); }
  .match-group-meta { font-size: .72rem; color: rgba(255,255,255,.5); text-align: right; line-height: 1.4; }
  .match-row { display: grid; grid-template-columns: 52px 1fr 80px 1fr 90px; align-items: center; padding: 9px 14px; border-bottom: 1px solid rgba(255,80,80,.1); gap: 8px; transition: background .15s; }
  .match-row:last-child { border-bottom: none; }
  .match-row:hover { background: rgba(255,255,255,.04); }
  .match-time { font-family: 'Bebas Neue', sans-serif; font-size: .95rem; color: var(--muted); letter-spacing: 1px; }
  .match-team { font-size: .82rem; font-weight: 600; }
  .match-team.home { text-align: right; }
  .match-score { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--white); background: rgba(255,255,255,.08); border-radius: 6px; padding: 3px 6px; min-width: 60px; }
  .match-score.played { color: var(--yellow); background: rgba(245,208,0,.1); }
  .match-ref { font-size: .7rem; color: var(--muted); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty-state { text-align: center; padding: 70px 20px; color: var(--muted); grid-column: 1/-1; }
  .empty-state .icon { font-size: 2.8rem; margin-bottom: 14px; }
  .empty-state h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: rgba(255,255,255,.35); letter-spacing: 2px; }

  .finales-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 20px; }
  .finale-round { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; animation: fadeIn .3s ease both; }
  .finale-round-header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--yellow); }
  .finale-round-header.ronde1  { background: #6a0000; border-bottom-color: #cc4400; }
  .finale-round-header.achtste { background: #880000; border-bottom-color: #dd2200; }
  .finale-round-header.kwart   { background: #aa0000; border-bottom-color: #ee1100; }
  .finale-round-header.halve   { background: #8a0000; border-bottom-color: #f5a000; }
  .finale-round-header.finale  { background: #6a0000; border-bottom-color: var(--yellow); }
  .finale-round-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: var(--yellow); }
  .finale-match-row { display: grid; grid-template-columns: 52px 1fr 80px 1fr 36px 90px; align-items: center; padding: 9px 14px; border-bottom: 1px solid rgba(255,80,80,.1); gap: 8px; transition: background .15s; }
  .finale-match-row:last-child { border-bottom: none; }
  .finale-match-row:hover { background: rgba(255,255,255,.04); }
  .finale-nr { font-family: 'Bebas Neue', sans-serif; font-size: .9rem; color: var(--muted); text-align: center; }
  .finale-team { font-size: .82rem; font-weight: 600; }
  .finale-team.home { text-align: right; }
  .finale-score { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--white); background: rgba(255,255,255,.08); border-radius: 6px; padding: 3px 4px; }
  .finale-score.played { color: var(--yellow); background: rgba(245,208,0,.1); }
  .finale-veld { font-size: .7rem; color: var(--muted); text-align: center; }
  .finale-ref { font-size: .7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .eindstand-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; animation: fadeIn .3s ease both; margin-top: 0; }
  .eindstand-header { background: linear-gradient(135deg, #6a0000, #aa0000); padding: 12px 18px; border-bottom: 2px solid var(--yellow); }
  .eindstand-header .finale-round-title { font-size: 1.4rem; }
  .eindstand-row { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-bottom: 1px solid rgba(255,80,80,.1); }
  .eindstand-row:last-child { border-bottom: none; }
  .eindstand-pos { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; width: 36px; text-align: center; }
  .eindstand-pos.p1 { color: var(--yellow); }
  .eindstand-pos.p2 { color: #c8b8b8; }
  .eindstand-pos.p3 { color: #c08060; }
  .eindstand-cat { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; min-width: 70px; }
  .eindstand-team { font-weight: 700; font-size: .95rem; color: var(--white); }

  @media (max-width: 640px) {
    header { padding: 14px 16px; } main { padding: 16px; }
    .tab-bar { padding: 0 16px; } .filter-bar { padding: 10px 16px; }
    .logo { font-size: 2rem; } .tab { padding: 12px 16px 10px; font-size: .9rem; }
    .matches-grid { grid-template-columns: 1fr; }
    .match-row { grid-template-columns: 44px 1fr 68px 1fr; }
    .match-ref { display: none; }
  }
</style>
</head>
<body>

<header>
  <div><div class="logo">SEP <span>Toernooi</span></div></div>
  <div class="header-meta">
    <h2>Live Standen &amp; Wedstrijden · 1 April 2026</h2>
    <div id="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Laden...</span>
    </div>
    <div id="next-refresh"></div>
  </div>
  <div class="header-actions">
    <button id="btn-refresh" onclick="loadFromGitHub()">⟳ Vernieuwen</button>
  </div>
</header>

<div class="tab-bar" id="tab-bar" style="display:none">
  <div class="tab active" onclick="switchTab('standings',this)">📊 Standen</div>
  <div class="tab" onclick="switchTab('matches',this)">⚽ Wedstrijden</div>
  <div class="tab" onclick="switchTab('finales',this)">🏆 Finales</div>
</div>

<div class="filter-bar" id="filter-bar" style="display:none">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Alle poules</button>
  <button class="filter-btn" onclick="setFilter('Meisjes',this)">Meisjes</button>
  <button class="filter-btn" onclick="setFilter('Gemengd',this)">Gemengd</button>
  <button class="filter-btn" onclick="setFilter('Jongens',this)">Jongens</button>
</div>

<main>
  <div id="loading-screen">
    <div class="spin">⚽</div>
    <h3>Standen laden...</h3>
  </div>
  <div id="error-screen" style="display:none">
    <div class="icon">⏳</div>
    <h3>Wachten op data...</h3>
    <p id="error-msg">Het Excel-bestand is nog niet beschikbaar. Zodra de uploader gestart is verschijnen de standen automatisch.</p>
    <p id="retry-msg" style="margin-top:12px;font-size:.8rem;color:var(--muted)"></p>
  </div>
  <div id="standings-view" style="display:none">
    <div id="poules-grid"></div>
  </div>
  <div id="matches-view" style="display:none">
    <div class="poule-selector" id="poule-selector"></div>
    <div class="matches-grid" id="matches-grid"></div>
  </div>
  <div id="finales-view" style="display:none">
    <div id="finales-grid"></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════
//  CONFIGURATIE — pas alleen deze regel aan
// ════════════════════════════════════════════════
const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/gjschotmeijer/4x4website_SEP/main/Master.xlsm';
// ════════════════════════════════════════════════

let allPoules = [], allFinales = [], currentFilter = 'all', currentTab = 'standings', selectedPoule = 'all';
let refreshTimer = null, refreshCountdown = 30;

// ── LOAD FROM GITHUB ──
async function loadFromGitHub() {
  setStatus('Laden...', false);
  document.getElementById('btn-refresh').disabled = true;
  try {
    const url = GITHUB_RAW_URL + '?t=' + Date.now(); // cache bust
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — controleer of het bestand op GitHub staat.`);
    const buf = await resp.arrayBuffer();
    parseExcel(buf);
    setStatus(`Bijgewerkt: ${new Date().toLocaleTimeString('nl-NL')}`, true);
    showApp();
    if (currentTab === 'standings') renderStandings();
    else renderMatches();
    buildPouleSelector();
    startAutoRefresh();
  } catch (err) {
    console.log('Bestand nog niet beschikbaar, opnieuw proberen...', err.message);
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = '';
    setStatus('Wachten op data...', false);
    // Automatisch opnieuw proberen na 15 seconden
    let countdown = 15;
    const retryMsg = document.getElementById('retry-msg');
    const retryTimer = setInterval(() => {
      countdown--;
      retryMsg.textContent = `Opnieuw proberen over ${countdown} seconden...`;
      if (countdown <= 0) {
        clearInterval(retryTimer);
        document.getElementById('error-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = '';
        loadFromGitHub();
      }
    }, 1000);
  }
  document.getElementById('btn-refresh').disabled = false;
}

// ── PARSE EXCEL ──
function parseExcel(buf) {
  const wb = XLSX.read(buf, { type: 'array', cellDates: true });
  const pouleSheets = wb.SheetNames.filter(n => n.startsWith('Poule'));
  allPoules = pouleSheets.map(name => parsePoule(wb, name)).filter(Boolean);
  // Parse finale sheets
  allFinales = [];
  ['Finales1', 'Finales2'].forEach(name => {
    if (wb.SheetNames.includes(name)) {
      const rounds = parseFinales(wb, name);
      allFinales.push(...rounds);
    }
  });
}

function parsePoule(wb, sheetName) {
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  if (!rows || rows.length < 10) return null;

  const info = rows[7] || [];
  const category    = info[4] || '';
  const pouleLetter = info[8] || sheetName.replace('Poule','');
  const veld        = info[10] || '';

  // Matches: header at row index 9, data from 10 onward
  const matches = [];
  for (let i = 10; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r[0] === null || r[0] === 'Team') break;
    if (typeof r[0] !== 'number') continue;
    const s1 = r[9], s2 = r[11];
    const hasScore = s1 !== null && s1 !== '' && s2 !== null && s2 !== '';
    matches.push({
      nr: r[0],
      start: fmtTime(r[1]),
      home:  r[4]  || '',
      away:  r[7]  || '',
      score1: hasScore ? s1 : null,
      score2: hasScore ? s2 : null,
      ref:   (r[12] || '').toString().trim(),
    });
  }

  // Standings
  let hi = -1;
  for (let i = 0; i < rows.length; i++) { if (rows[i] && rows[i][0] === 'Team') { hi = i; break; } }
  const teams = [];
  if (hi >= 0) {
    for (let i = hi+1; i < rows.length; i++) {
      const r = rows[i]; if (!r || !r[0]) break;
      teams.push({ name: r[0], pts: n(r[14]), g: n(r[16]), w: n(r[17]), v: n(r[18]), gd: n(r[19]) });
    }
    teams.sort((a,b) => b.pts - a.pts);
  }

  return { name: `Poule ${pouleLetter}`, category, veld, teams, matches };
}

function fmtTime(v) {
  if (!v) return '';
  if (v instanceof Date) return `${String(v.getHours()).padStart(2,'0')}:${String(v.getMinutes()).padStart(2,'0')}`;
  if (typeof v === 'string' && v.includes(':')) return v.substring(0,5);
  if (typeof v === 'number') {
    const m = Math.round(v * 24 * 60);
    return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  }
  return String(v);
}
function n(v) { return typeof v === 'number' ? v : parseInt(v)||0; }

// ── PARSE FINALES ──
function parseFinales(wb, sheetName) {
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  const rounds = [];
  let currentRound = null;

  // Round title keywords and their CSS class
  const roundStyles = {
    'eerste finaleronde': 'ronde1',
    'achtste finales':    'achtste',
    'kwart finales':      'kwart',
    'halve finales':      'halve',
    'finale':             'finale',
    'kleine finale':      'finale',
  };

  // Eindstand keywords
  const eindstandKeywords = ['1e plaats', '2e plaats', '3e plaats'];

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    if (!r) continue;
    const cell0 = (r[0] || '').toString().trim();
    const cell3 = (r[3] || '').toString().trim();

    // Detect round header (e.g. "Achtste finales", "Finale")
    const lc = cell0.toLowerCase();
    const lc3 = cell3.toLowerCase();
    let matchedStyle = null;
    for (const [key, style] of Object.entries(roundStyles)) {
      if (lc.includes(key) || lc3.includes(key)) { matchedStyle = style; break; }
    }
    // Special case: "Finale en Kleine finale" row
    if (lc.includes('finale') && lc3.includes('kleine finale')) matchedStyle = 'finale';

    if (matchedStyle && cell0 !== 'Nr.') {
      // Determine title
      let title = cell0;
      if (lc3.includes('kleine finale')) title = 'Finale & Kleine finale';
      currentRound = { title, style: matchedStyle, matches: [], isEindstand: false };
      rounds.push(currentRound);
      continue;
    }

    // Skip header rows (Nr., Aanvang, ...)
    if (cell0 === 'Nr.' || cell0 === 'Aanvang') continue;

    // Detect eindstand section
    if (eindstandKeywords.some(k => cell0.toLowerCase().startsWith(k.toLowerCase()))) {
      // Find or create eindstand round
      let eindRound = rounds.find(r => r.isEindstand);
      if (!eindRound) {
        eindRound = { title: 'Eindstand', style: 'finale', matches: [], isEindstand: true };
        rounds.push(eindRound);
      }
      // Next row has the team name (row i+1, col 4 or 0)
      const nextRow = rows[i + 1] || [];
      const teamName = (nextRow[4] || nextRow[0] || '').toString().trim();
      eindRound.matches.push({ label: cell0, team: teamName });
      continue;
    }

    // Match rows: first col is a number
    if (currentRound && !currentRound.isEindstand && typeof r[0] === 'number') {
      const s1 = r[10], s2 = r[12];
      const hasScore = s1 !== null && s1 !== '' && s2 !== null && s2 !== '';
      currentRound.matches.push({
        nr:     r[0],
        start:  fmtTime(r[1]),
        home:   (r[4] || '').toString(),
        away:   (r[7] || '').toString(),
        veld:   r[9] || '',
        score1: hasScore ? s1 : null,
        score2: hasScore ? s2 : null,
        ref:    (r[13] || '').toString().trim(),
      });
    }
  }

  return rounds.filter(r => r.matches.length > 0);
}

// ── RENDER FINALES ──
function renderFinales() {
  const grid = document.getElementById('finales-grid');
  if (!allFinales.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🏆</div><h3>Nog geen finaledata</h3></div>`;
    return;
  }

  const regularRounds = allFinales.filter(r => !r.isEindstand);
  const eindstand = allFinales.find(r => r.isEindstand);

  let html = '<div class="finales-grid">';

  regularRounds.forEach((round, i) => {
    html += `
      <div class="finale-round" style="animation-delay:${i*.05}s">
        <div class="finale-round-header ${round.style}">
          <div class="finale-round-title">${round.title}</div>
        </div>
        ${round.matches.map(m => {
          const played = m.score1 !== null;
          return `
          <div class="finale-match-row">
            <div class="finale-nr">${m.nr}</div>
            <div class="finale-team home">${m.home}</div>
            <div class="finale-score ${played ? 'played' : ''}">${played ? m.score1 + ' – ' + m.score2 : '– –'}</div>
            <div class="finale-team">${m.away}</div>
            <div class="finale-veld">${m.veld ? 'V'+m.veld : ''}</div>
            <div class="finale-ref">${m.ref}</div>
          </div>`;
        }).join('')}
      </div>`;
  });

  html += '</div>';

  // Eindstand onderaan
  if (eindstand && eindstand.matches.length) {
    const posClass = ['p1','p2','p3'];
    // Group by category
    const grouped = {};
    eindstand.matches.forEach(m => {
      const cat = m.label.includes('gemengd') ? 'Gemengd' : m.label.includes('meisjes') ? 'Meisjes' : 'Jongens';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(m);
    });

    html += `<div class="eindstand-card" style="margin-top:20px">
      <div class="eindstand-header"><div class="finale-round-title">🏆 Eindstand</div></div>`;

    Object.entries(grouped).forEach(([cat, items]) => {
      items.forEach((m, j) => {
        const pos = j + 1;
        html += `
        <div class="eindstand-row">
          <div class="eindstand-pos ${posClass[j] || ''}">${pos}</div>
          <div class="eindstand-cat">${cat}</div>
          <div class="eindstand-team">${m.team || '—'}</div>
        </div>`;
      });
    });

    html += '</div>';
  }

  grid.innerHTML = html;
}

// ── UI ──
function setStatus(t, live) {
  document.getElementById('status-text').textContent = t;
  document.getElementById('status-dot').style.background = live ? '#2ea84f' : '#f0b429';
}

function showApp() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'none';
  document.getElementById('tab-bar').style.display = 'flex';
  document.getElementById('filter-bar').style.display = 'flex';
  document.getElementById('standings-view').style.display = currentTab === 'standings' ? 'block' : 'none';
  document.getElementById('matches-view').style.display   = currentTab === 'matches'   ? 'block' : 'none';
  document.getElementById('finales-view').style.display   = currentTab === 'finales'   ? 'block' : 'none';
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('filter-bar').style.display = tab === 'finales' ? 'none' : 'flex';
  document.getElementById('standings-view').style.display = tab === 'standings' ? 'block' : 'none';
  document.getElementById('matches-view').style.display   = tab === 'matches'   ? 'block' : 'none';
  document.getElementById('finales-view').style.display   = tab === 'finales'   ? 'block' : 'none';
  if (tab === 'standings') renderStandings();
  else if (tab === 'matches') renderMatches();
  else if (tab === 'finales') renderFinales();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentTab === 'standings') renderStandings();
  else renderMatches();
}

// ── RENDER STANDINGS ──
function renderStandings() {
  const grid = document.getElementById('poules-grid');
  const list = filteredPoules();
  if (!list.length) { grid.innerHTML = `<div class="empty-state"><div class="icon">⚽</div><h3>Geen poules gevonden</h3></div>`; return; }
  grid.innerHTML = list.map((p,i) => `
    <div class="poule-card" style="animation-delay:${i*.03}s">
      <div class="poule-header">
        <div class="poule-title">${p.name}</div>
        <div class="poule-meta">${p.category}<br>Veld ${p.veld}</div>
      </div>
      <table>
        <thead><tr><th class="num">#</th><th>Team</th><th class="num">G</th><th class="num">W</th><th class="num">V</th><th class="num">Ge</th><th class="num">Pnt</th></tr></thead>
        <tbody>${p.teams.map((t,j) => `
          <tr><td class="rank">${j+1}</td><td class="team-name">${t.name}</td>
          <td class="num">${t.g}</td><td class="num">${t.w}</td><td class="num">${t.v}</td><td class="num">${t.gd}</td>
          <td class="pts">${t.pts}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');
}

// ── RENDER MATCHES ──
function buildPouleSelector() {
  const sel = document.getElementById('poule-selector');
  sel.innerHTML = `<button class="ps-btn ${selectedPoule==='all'?'active':''}" onclick="selectPoule('all',this)">Alle poules</button>`
    + allPoules.map(p => `<button class="ps-btn ${selectedPoule===p.name?'active':''}" onclick="selectPoule('${p.name}',this)">${p.name}</button>`).join('');
}

function selectPoule(name, btn) {
  selectedPoule = name;
  document.querySelectorAll('.ps-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatches();
}

function renderMatches() {
  buildPouleSelector();
  const grid = document.getElementById('matches-grid');
  let list = filteredPoules();
  if (selectedPoule !== 'all') list = list.filter(p => p.name === selectedPoule);
  if (!list.length) { grid.innerHTML = `<div class="empty-state"><div class="icon">📋</div><h3>Geen wedstrijden gevonden</h3></div>`; return; }
  grid.innerHTML = list.map((p,i) => `
    <div class="match-group" style="animation-delay:${i*.03}s">
      <div class="match-group-header">
        <div class="match-group-title">${p.name}</div>
        <div class="match-group-meta">${p.category} · Veld ${p.veld}</div>
      </div>
      ${p.matches.map(m => {
        const played = m.score1 !== null;
        return `<div class="match-row">
          <div class="match-time">${m.start}</div>
          <div class="match-team home">${m.home}</div>
          <div class="match-score ${played?'played':''}">${played ? m.score1+' – '+m.score2 : '– – –'}</div>
          <div class="match-team">${m.away}</div>
          <div class="match-ref">${m.ref}</div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function filteredPoules() {
  return currentFilter === 'all' ? allPoules : allPoules.filter(p => p.category === currentFilter);
}

// ── AUTO REFRESH ──
function startAutoRefresh() {
  clearInterval(refreshTimer); refreshCountdown = 60; updateCountdown();
  refreshTimer = setInterval(() => {
    refreshCountdown--;
    updateCountdown();
    if (refreshCountdown <= 0) { refreshCountdown = 60; loadFromGitHub(); }
  }, 1000);
}
function updateCountdown() {
  const el = document.getElementById('next-refresh');
  if (el && allPoules.length) el.textContent = `Volgende update over ${refreshCountdown}s`;
}

// ── START ──
loadFromGitHub();
</script>
</body>
</html>
